<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta http-equiv="Cache-Control"
          content="no-store, no-cache, must-revalidate">

    <meta http-equiv="Pragma"
          content="no-cache">

    <meta http-equiv="Expires"
          content="0">

    <meta name="referrer"
          content="no-referrer">
	
	
	
	
    <title>Hash Calc</title>
    <style>
        :root {
            --bg: #1e1e1e;
            --surface: #2a2a2a;
            --text: #e0e0e0;
            --input-bg: #d3d3d3;
            --input-text: #1e1e1e;
            --border: #555;
            --accent-green: #4caf50;
            --label-width: 120px;
            --font-mono: 'Courier New', Courier, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #121212;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px;
        }

        .window {
            background-color: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            width: 100%;
            max-width: 620px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            overflow: hidden;
        }

        .window-header {
            background-color: #252525;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            color: #aaa;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .window-header .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #555;
        }

        .window-content {
            padding: 20px 24px 24px;
        }

        .input-area {
            margin-bottom: 24px;
        }

        .input-area label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #aaa;
            margin-bottom: 6px;
        }

        #data-input {
            width: 100%;
            padding: 12px 14px;
            font-size: 16px;
            font-family: var(--font-mono);
            background-color: var(--input-bg);
            color: var(--input-text);
            border: 1px solid var(--border);
            border-radius: 4px;
            outline: none;
            transition: border 0.2s;
            resize: none;
            line-height: 1.4;
            height: 80px;
        }

        #data-input:focus {
            border-color: #888;
            box-shadow: 0 0 0 2px rgba(255,255,255,0.1);
        }

        .hash-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 28px;
        }

        .hash-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .hash-label {
            width: 70px;
            min-width: 70px;
            font-size: 13px;
            font-weight: 500;
            color: #bbb;
            text-align: left;
            user-select: none;
            flex-shrink: 0;
            white-space: nowrap;
        }

        .hash-output {
            flex: 1;
            min-width: 0;
            padding: 8px 12px;
            font-size: 15px;
            font-family: var(--font-mono);
            background-color: var(--input-bg);
            color: var(--input-text);
            border: 1px solid var(--border);
            border-radius: 4px;
            outline: none;
            transition: border 0.2s;
            cursor: text;
            box-sizing: border-box;
            overflow-x: auto;
            white-space: nowrap;
        }

        .hash-output:focus {
            border-color: #888;
            box-shadow: 0 0 0 2px rgba(255,255,255,0.1);
        }

        .verify-area {
            border-top: 1px solid var(--border);
            padding-top: 18px;
            margin-top: 10px;
        }

        .verify-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .verify-label {
            width: 70px;
            min-width: 70px;
            font-size: 13px;
            font-weight: 500;
            color: #bbb;
            text-align: left;
            user-select: none;
            flex-shrink: 0;
            white-space: nowrap;
        }

        #verify-input {
            flex: 1;
            min-width: 0;
            padding: 8px 12px;
            font-size: 15px;
            font-family: var(--font-mono);
            background-color: var(--input-bg);
            color: var(--input-text);
            border: 1px solid var(--border);
            border-radius: 4px;
            outline: none;
            transition: border 0.2s, background-color 0.3s;
            box-sizing: border-box;
        }

        #verify-input:focus {
            border-color: #888;
            box-shadow: 0 0 0 2px rgba(255,255,255,0.1);
        }

        /* Green highlight for verify match */
        #verify-input.match {
            background-color: #c8e6c9;
            border-color: var(--accent-green);
            color: #1e1e1e;
        }

        /* Green highlight for the matching hash output field */
        .hash-output.match {
            background-color: #c8e6c9;
            border-color: var(--accent-green);
            color: #1e1e1e;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #2a2a2a;
        }
        ::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="window">
        <div class="window-header">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span style="margin-left: 8px;">Hash Calc</span>
        </div>
        <div class="window-content">
            <div class="input-area">
                <label for="data-input">Input string (max 256 chars)</label>
                <textarea id="data-input"
                          maxlength="256"
                          placeholder="Type or paste text..."
                          autocomplete="off"
                          autocorrect="off"
                          autocapitalize="off"
                          spellcheck="false"></textarea>
            </div>

            <div class="hash-list">
                <div class="hash-row">
                    <span class="hash-label">CRC32</span>
                    <input type="text" class="hash-output" id="out-crc32" readonly
                           autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
                </div>
                <div class="hash-row">
                    <span class="hash-label">MD5</span>
                    <input type="text" class="hash-output" id="out-md5" readonly
                           autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
                </div>
                <div class="hash-row">
                    <span class="hash-label">SHA-1</span>
                    <input type="text" class="hash-output" id="out-sha1" readonly
                           autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
                </div>
                <div class="hash-row">
                    <span class="hash-label">SHA-256</span>
                    <input type="text" class="hash-output" id="out-sha256" readonly
                           autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
                </div>
                <div class="hash-row">
                    <span class="hash-label">SHA-384</span>
                    <input type="text" class="hash-output" id="out-sha384" readonly
                           autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
                </div>
                <div class="hash-row">
                    <span class="hash-label">SHA-512</span>
                    <input type="text" class="hash-output" id="out-sha512" readonly
                           autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
                </div>
            </div>

            <div class="verify-area">
                <div class="verify-row">
                    <span class="verify-label">Verify</span>
                    <input type="text" id="verify-input" placeholder="Paste hash to compare..."
                           autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ────────── UI helpers (select all text on focus/click) ──────────
            function selectOnFocus(element) {
                element.addEventListener('focus', () => element.select());
                element.addEventListener('click', () => element.select());
            }

            document.addEventListener('DOMContentLoaded', () => {
                const dataInput = document.getElementById('data-input');
                if (dataInput) {
                    selectOnFocus(dataInput);
                    dataInput.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter') {
                            e.preventDefault();
                        }
                    });
                    // On drop, prevent full selection and place cursor at start
                    dataInput.addEventListener('drop', () => {
                        setTimeout(() => {
                            dataInput.setSelectionRange(0, 0);
                        }, 0);
                    });
                }
                document.querySelectorAll('.hash-output').forEach(selectOnFocus);
                const verifyInput = document.getElementById('verify-input');
                if (verifyInput) selectOnFocus(verifyInput);
            });

            // ────────── Utility: UTF‑8 bytes from string ──────────
            const encoder = new TextEncoder();
            function toBytes(str) {
                return encoder.encode(str);
            }

            // ────────── Precomputed hex table (lowercase) ──────────
            const HEX_TABLE = new Array(256);
            for (let i = 0; i < 256; i++) {
                HEX_TABLE[i] = i.toString(16).padStart(2, '0');
            }

            function bytesToHex(bytes) {
                let out = '';
                for (let i = 0; i < bytes.length; i++) {
                    out += HEX_TABLE[bytes[i]];
                }
                return out;
            }

            // ────────── Pure JS SHA-256 fallback (for browsers without Web Crypto) ──────────
            function rightRotate(value, amount) {
                return (value >>> amount) | (value << (32 - amount));
            }

            function sha256pure(message) {
                // message: Uint8Array
                const K = [
                    0x428a2f98, 0x71374491, 0xb5c0fbcf, 0xe9b5dba5, 0x3956c25b, 0x59f111f1, 0x923f82a4, 0xab1c5ed5,
                    0xd807aa98, 0x12835b01, 0x243185be, 0x550c7dc3, 0x72be5d74, 0x80deb1fe, 0x9bdc06a7, 0xc19bf174,
                    0xe49b69c1, 0xefbe4786, 0x0fc19dc6, 0x240ca1cc, 0x2de92c6f, 0x4a7484aa, 0x5cb0a9dc, 0x76f988da,
                    0x983e5152, 0xa831c66d, 0xb00327c8, 0xbf597fc7, 0xc6e00bf3, 0xd5a79147, 0x06ca6351, 0x14292967,
                    0x27b70a85, 0x2e1b2138, 0x4d2c6dfc, 0x53380d13, 0x650a7354, 0x766a0abb, 0x81c2c92e, 0x92722c85,
                    0xa2bfe8a1, 0xa81a664b, 0xc24b8b70, 0xc76c51a3, 0xd192e819, 0xd6990624, 0xf40e3585, 0x106aa070,
                    0x19a4c116, 0x1e376c08, 0x2748774c, 0x34b0bcb5, 0x391c0cb3, 0x4ed8aa4a, 0x5b9cca4f, 0x682e6ff3,
                    0x748f82ee, 0x78a5636f, 0x84c87814, 0x8cc70208, 0x90befffa, 0xa4506ceb, 0xbef9a3f7, 0xc67178f2
                ];
                const bytes = message;
                const len = bytes.length;
                const bitLen = len * 8;
                const k = (((len + 8) >>> 6) + 1) * 64; // number of 64-byte blocks after padding
                const padded = new Uint8Array(k);
                padded.set(bytes);
                padded[len] = 0x80;
                const view = new DataView(padded.buffer);
                view.setUint32(k - 8, Math.floor(bitLen / 0x100000000), false); // high bits
                view.setUint32(k - 4, bitLen, false); // low bits

                const H = [0x6a09e667, 0xbb67ae85, 0x3c6ef372, 0xa54ff53a, 0x510e527f, 0x9b05688c, 0x1f83d9ab, 0x5be0cd19];
                const W = new Int32Array(64);
                for (let offset = 0; offset < k; offset += 64) {
                    for (let i = 0; i < 16; i++) {
                        W[i] = view.getInt32(offset + i * 4, false);
                    }
                    for (let i = 16; i < 64; i++) {
                        const s0 = rightRotate(W[i-15], 7) ^ rightRotate(W[i-15], 18) ^ (W[i-15] >>> 3);
                        const s1 = rightRotate(W[i-2], 17) ^ rightRotate(W[i-2], 19) ^ (W[i-2] >>> 10);
                        W[i] = (W[i-16] + s0 + W[i-7] + s1) | 0;
                    }
                    let a = H[0], b = H[1], c = H[2], d = H[3], e = H[4], f = H[5], g = H[6], h = H[7];
                    for (let i = 0; i < 64; i++) {
                        const S1 = rightRotate(e, 6) ^ rightRotate(e, 11) ^ rightRotate(e, 25);
                        const ch = (e & f) ^ (~e & g);
                        const temp1 = (h + S1 + ch + K[i] + W[i]) | 0;
                        const S0 = rightRotate(a, 2) ^ rightRotate(a, 13) ^ rightRotate(a, 22);
                        const maj = (a & b) ^ (a & c) ^ (b & c);
                        const temp2 = (S0 + maj) | 0;
                        h = g; g = f; f = e; e = (d + temp1) | 0; d = c; c = b; b = a; a = (temp1 + temp2) | 0;
                    }
                    H[0] = (H[0] + a) | 0;
                    H[1] = (H[1] + b) | 0;
                    H[2] = (H[2] + c) | 0;
                    H[3] = (H[3] + d) | 0;
                    H[4] = (H[4] + e) | 0;
                    H[5] = (H[5] + f) | 0;
                    H[6] = (H[6] + g) | 0;
                    H[7] = (H[7] + h) | 0;
                }
                let hex = '';
                for (let i = 0; i < 8; i++) {
                    // Convert to unsigned 32-bit before formatting to hex to avoid negative sign
                    hex += (H[i] >>> 0).toString(16).padStart(8, '0');
                }
                return hex;
            }

            // ────────── CRC32 (standard ISO HDLC / zlib) ──────────
            const CRC32 = (() => {
                const table = new Int32Array(256);
                for (let i = 0; i < 256; i++) {
                    let c = i;
                    for (let j = 0; j < 8; j++) {
                        c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
                    }
                    table[i] = c;
                }
                // Now accepts Uint8Array directly
                return function crc32(bytes) {
                    let crc = 0xFFFFFFFF;
                    for (let i = 0; i < bytes.length; i++) {
                        crc = (crc >>> 8) ^ table[(crc ^ bytes[i]) & 0xFF];
                    }
                    crc = (crc ^ 0xFFFFFFFF) >>> 0; // unsigned
                    return crc.toString(16).padStart(8, '0');
                };
            })();

            // ────────── MD5 helper functions (no unused parameters) ──────────
            const F = (x, y, z) => (x & y) | (~x & z);
            const G = (x, y, z) => (x & z) | (y & ~z);
            const H = (x, y, z) => x ^ y ^ z;
            const I = (x, y, z) => y ^ (x | ~z);
            const rotl = (x, n) => (x << n) | (x >>> (32 - n));

            function ff(a, b, c, d, M, k, t) {
                return (a + F(b, c, d) + M[k] + t) | 0;
            }
            function gg(a, b, c, d, M, k, t) {
                return (a + G(b, c, d) + M[k] + t) | 0;
            }
            function hh(a, b, c, d, M, k, t) {
                return (a + H(b, c, d) + M[k] + t) | 0;
            }
            function ii(a, b, c, d, M, k, t) {
                return (a + I(b, c, d) + M[k] + t) | 0;
            }

            // ────────── MD5 (RFC 1321), now accepts Uint8Array ──────────
            function md5(bytes) {
                const len = bytes.length;
                const msgLen = len * 8;
                // Append padding
                const paddedLen = (((len + 8) >>> 6) + 1) * 64; // multiple of 64 bytes
                const padded = new Uint8Array(paddedLen);
                padded.set(bytes);
                padded[len] = 0x80;
                // Write original bit length in little‑endian at the end
                const dv = new DataView(padded.buffer);
                dv.setUint32(paddedLen - 8, msgLen, true); // low 32 bits
                dv.setUint32(paddedLen - 4, Math.floor(msgLen / 0x100000000), true); // high 32 bits

                // Initialize MD5 state
                let a0 = 0x67452301;
                let b0 = 0xefcdab89;
                let c0 = 0x98badcfe;
                let d0 = 0x10325476;

                // Process each 64‑byte block
                for (let offset = 0; offset < paddedLen; offset += 64) {
                    const M = new Int32Array(16);
                    for (let i = 0; i < 16; i++) {
                        M[i] = dv.getInt32(offset + i * 4, true);
                    }
                    let A = a0, B = b0, C = c0, D = d0;

                    // Round 1
                    let q = ff(A,B,C,D, M, 0, 0xd76aa478); A = rotl(q,7)+B|0; D = rotl(ff(D,A,B,C, M, 1, 0xe8c7b756),12)+A|0; C = rotl(ff(C,D,A,B, M, 2, 0x242070db),17)+D|0; B = rotl(ff(B,C,D,A, M, 3, 0xc1bdceee),22)+C|0;
                    A = rotl(ff(A,B,C,D, M, 4, 0xf57c0faf),7)+B|0; D = rotl(ff(D,A,B,C, M, 5, 0x4787c62a),12)+A|0; C = rotl(ff(C,D,A,B, M, 6, 0xa8304613),17)+D|0; B = rotl(ff(B,C,D,A, M, 7, 0xfd469501),22)+C|0;
                    A = rotl(ff(A,B,C,D, M, 8, 0x698098d8),7)+B|0; D = rotl(ff(D,A,B,C, M, 9, 0x8b44f7af),12)+A|0; C = rotl(ff(C,D,A,B, M, 10, 0xffff5bb1),17)+D|0; B = rotl(ff(B,C,D,A, M, 11, 0x895cd7be),22)+C|0;
                    A = rotl(ff(A,B,C,D, M, 12, 0x6b901122),7)+B|0; D = rotl(ff(D,A,B,C, M, 13, 0xfd987193),12)+A|0; C = rotl(ff(C,D,A,B, M, 14, 0xa679438e),17)+D|0; B = rotl(ff(B,C,D,A, M, 15, 0x49b40821),22)+C|0;

                    // Round 2
                    q = gg(A,B,C,D, M, 1, 0xf61e2562); A = rotl(q,5)+B|0; D = rotl(gg(D,A,B,C, M, 6, 0xc040b340),9)+A|0; C = rotl(gg(C,D,A,B, M, 11, 0x265e5a51),14)+D|0; B = rotl(gg(B,C,D,A, M, 0, 0xe9b6c7aa),20)+C|0;
                    A = rotl(gg(A,B,C,D, M, 5, 0xd62f105d),5)+B|0; D = rotl(gg(D,A,B,C, M, 10, 0x02441453),9)+A|0; C = rotl(gg(C,D,A,B, M, 15, 0xd8a1e681),14)+D|0; B = rotl(gg(B,C,D,A, M, 4, 0xe7d3fbc8),20)+C|0;
                    A = rotl(gg(A,B,C,D, M, 9, 0x21e1cde6),5)+B|0; D = rotl(gg(D,A,B,C, M, 14, 0xc33707d6),9)+A|0; C = rotl(gg(C,D,A,B, M, 3, 0xf4d50d87),14)+D|0; B = rotl(gg(B,C,D,A, M, 8, 0x455a14ed),20)+C|0;
                    A = rotl(gg(A,B,C,D, M, 13, 0xa9e3e905),5)+B|0; D = rotl(gg(D,A,B,C, M, 2, 0xfcefa3f8),9)+A|0; C = rotl(gg(C,D,A,B, M, 7, 0x676f02d9),14)+D|0; B = rotl(gg(B,C,D,A, M, 12, 0x8d2a4c8a),20)+C|0;

                    // Round 3
                    q = hh(A,B,C,D, M, 5, 0xfffa3942); A = rotl(q,4)+B|0; D = rotl(hh(D,A,B,C, M, 8, 0x8771f681),11)+A|0; C = rotl(hh(C,D,A,B, M, 11, 0x6d9d6122),16)+D|0; B = rotl(hh(B,C,D,A, M, 14, 0xfde5380c),23)+C|0;
                    A = rotl(hh(A,B,C,D, M, 1, 0xa4beea44),4)+B|0; D = rotl(hh(D,A,B,C, M, 4, 0x4bdecfa9),11)+A|0; C = rotl(hh(C,D,A,B, M, 7, 0xf6bb4b60),16)+D|0; B = rotl(hh(B,C,D,A, M, 10, 0xbebfbc70),23)+C|0;
                    A = rotl(hh(A,B,C,D, M, 13, 0x289b7ec6),4)+B|0; D = rotl(hh(D,A,B,C, M, 0, 0xeaa127fa),11)+A|0; C = rotl(hh(C,D,A,B, M, 3, 0xd4ef3085),16)+D|0; B = rotl(hh(B,C,D,A, M, 6, 0x04881d05),23)+C|0;
                    A = rotl(hh(A,B,C,D, M, 9, 0xd9d4d039),4)+B|0; D = rotl(hh(D,A,B,C, M, 12, 0xe6db99e5),11)+A|0; C = rotl(hh(C,D,A,B, M, 15, 0x1fa27cf8),16)+D|0; B = rotl(hh(B,C,D,A, M, 2, 0xc4ac5665),23)+C|0;

                    // Round 4
                    q = ii(A,B,C,D, M, 0, 0xf4292244); A = rotl(q,6)+B|0; D = rotl(ii(D,A,B,C, M, 7, 0x432aff97),10)+A|0; C = rotl(ii(C,D,A,B, M, 14, 0xab9423a7),15)+D|0; B = rotl(ii(B,C,D,A, M, 5, 0xfc93a039),21)+C|0;
                    A = rotl(ii(A,B,C,D, M, 12, 0x655b59c3),6)+B|0; D = rotl(ii(D,A,B,C, M, 3, 0x8f0ccc92),10)+A|0; C = rotl(ii(C,D,A,B, M, 10, 0xffeff47d),15)+D|0; B = rotl(ii(B,C,D,A, M, 1, 0x85845dd1),21)+C|0;
                    A = rotl(ii(A,B,C,D, M, 8, 0x6fa87e4f),6)+B|0; D = rotl(ii(D,A,B,C, M, 15, 0xfe2ce6e0),10)+A|0; C = rotl(ii(C,D,A,B, M, 6, 0xa3014314),15)+D|0; B = rotl(ii(B,C,D,A, M, 13, 0x4e0811a1),21)+C|0;
                    A = rotl(ii(A,B,C,D, M, 4, 0xf7537e82),6)+B|0; D = rotl(ii(D,A,B,C, M, 11, 0xbd3af235),10)+A|0; C = rotl(ii(C,D,A,B, M, 2, 0x2ad7d2bb),15)+D|0; B = rotl(ii(B,C,D,A, M, 9, 0xeb86d391),21)+C|0;

                    a0 = (a0 + A) | 0;
                    b0 = (b0 + B) | 0;
                    c0 = (c0 + C) | 0;
                    d0 = (d0 + D) | 0;
                }

                // Produce final hex string
                const out = new Uint8Array(16);
                const outView = new DataView(out.buffer);
                outView.setInt32(0, a0, true);
                outView.setInt32(4, b0, true);
                outView.setInt32(8, c0, true);
                outView.setInt32(12, d0, true);

                const result = bytesToHex(out);
                // Clear the local padded copy (original bytes will be cleared centrally)
                padded.fill(0);
                return result;
            }

            // ────────── SHA helpers using Web Crypto, with fallback for SHA-256 ──────────
            async function sha(algorithm, bytes) {
                // If Web Crypto API is available, use it (preferred)
                if (typeof crypto !== 'undefined' && crypto.subtle) {
                    try {
                        const hashBuffer = await crypto.subtle.digest(algorithm, bytes);
                        const hex = bytesToHex(new Uint8Array(hashBuffer));
                        return hex;
                    } catch (e) {
                        return '';
                    }
                } else {
                    // Web Crypto not available (e.g., file:// on some mobile browsers)
                    // Provide pure JS fallback for SHA-256 only
                    if (algorithm === 'SHA-256') {
                        return sha256pure(bytes);
                    }
                    return ''; // other SHA variants not supported in fallback
                }
            }

            const sha1   = (bytes) => sha('SHA-1', bytes);
            const sha256 = (bytes) => sha('SHA-256', bytes);
            const sha384 = (bytes) => sha('SHA-384', bytes);
            const sha512 = (bytes) => sha('SHA-512', bytes);

            // ────────── DOM references ──────────
            const inputEl   = document.getElementById('data-input');
            const verifyEl  = document.getElementById('verify-input');
            const outputs = {
                crc32:      document.getElementById('out-crc32'),
                md5:        document.getElementById('out-md5'),
                sha1:       document.getElementById('out-sha1'),
                sha256:     document.getElementById('out-sha256'),
                sha384:     document.getElementById('out-sha384'),
                sha512:     document.getElementById('out-sha512')
            };

            // ────────── Race condition guard ──────────
            let generation = 0;

            // ────────── Verify highlight (also highlights matched output) ──────────
            function updateVerify() {
                const val = verifyEl.value.trim().toLowerCase();
                let matchedOutput = null;
                if (val.length > 0) {
                    for (const out of Object.values(outputs)) {
                        if (out.value === val) {
                            matchedOutput = out;
                            break;
                        }
                    }
                }
                verifyEl.classList.toggle('match', matchedOutput !== null);
                for (const out of Object.values(outputs)) {
                    out.classList.toggle('match', out === matchedOutput);
                }
            }

            // ────────── Main update function ──────────
            let updateTimer = 0;
            function updateHashes() {
                clearTimeout(updateTimer);
                updateTimer = setTimeout(async () => {
                    const currentGen = ++generation;
                    const text = inputEl.value;
                    if (text.length === 0) {
                        for (const out of Object.values(outputs)) {
                            out.value = '';
                        }
                        verifyEl.value = '';
                        verifyEl.classList.remove('match');
                        for (const out of Object.values(outputs)) {
                            out.classList.remove('match');
                        }
                        return;
                    }

                    // Encode once, share across all functions
                    const bytes = encoder.encode(text);

                    // Synchronous hashes
                    const crc = CRC32(bytes);
                    const md5hash = md5(bytes);

                    // Asynchronous SHA hashes (bytes.buffer is read by crypto.subtle)
                    const [s1, s256, s384, s512] = await Promise.all([
                        sha1(bytes),
                        sha256(bytes),
                        sha384(bytes),
                        sha512(bytes)
                    ]);

                    // Ignore result if input has changed since we started
                    if (currentGen !== generation) {
                        bytes.fill(0); // clear stale data
                        return;
                    }

                    // Write outputs
                    outputs.crc32.value  = crc;
                    outputs.md5.value    = md5hash;
                    outputs.sha1.value   = s1;
                    outputs.sha256.value = s256;
                    outputs.sha384.value = s384;
                    outputs.sha512.value = s512;

                    // Centralized clearing of the single byte buffer
                    bytes.fill(0);

                    // Update verify status
                    updateVerify();
                }, 50);
            }

            // ────────── Event listeners ──────────
            inputEl.addEventListener('input', updateHashes);
            verifyEl.addEventListener('input', updateVerify);
			
			// Security
            function clearSensitiveData() {
                generation++;

                inputEl.value = '';
                verifyEl.value = '';

                verifyEl.classList.remove('match');

                for (const out of Object.values(outputs)) {
                    out.value = '';
                    out.classList.remove('match');
                }
            }

            // Clear when page is being hidden
            window.addEventListener('pagehide', clearSensitiveData);

            // Clear when restored from Back/Forward Cache
            window.addEventListener('pageshow', (event) => {
                if (event.persisted) {
                    clearSensitiveData();
                }
            });


            // Initial state (empty)
            updateHashes();
        })();
    </script>
</body>
