<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta http-equiv="Cache-Control"
          content="no-store, no-cache, must-revalidate">

    <meta http-equiv="Pragma"
          content="no-cache">

    <meta http-equiv="Expires"
          content="0">

    <meta name="referrer"
          content="no-referrer">


    <title>Base58/91 Converter</title>

    <style>
        body {
            font-family: sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            padding: 15px;
            margin: 0;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h2 {
            text-align: center;
            color: #00ff99;
            cursor: pointer;
            user-select: none;
        }

        label {
            display: block;
            margin: 15px 0 5px;
            font-weight: bold;
        }

        textarea {
            width: 100%;
            height: 100px;
            box-sizing: border-box;
            background-color: #1e1e1e;
            color: #fff;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 10px;
            font-family: monospace;
            font-size: 16px;
            resize: vertical;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .btn-group-center {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            flex: 1;
            min-width: 120px;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-encode {
            background-color: #00ff99;
            color: #000;
        }

        .btn-decode {
            background-color: #00bfff;
            color: #000;
        }

        .btn-share {
            background-color: #ffcc00;
            color: #000;
        }

        .btn-copy {
            background-color: #444;
            color: #fff;
        }

        .btn-clear {
            background-color: #ff3366;
            color: #fff;
        }

        .btn-paste {
            background-color: #9b59b6;
            color: #fff;
        }

        button:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 id="converterTitle">Base58</h2>

    <label id="inputLabel" for="input">Input (Text or Encoded Data):</label>
    <textarea
        id="input"
        placeholder="Enter text or encoded data..."
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"></textarea>

    <div class="btn-group">
        <button id="pasteBtn" class="btn-paste">Paste</button>
        <button id="clearInputBtn" class="btn-clear">Clear</button>
    </div>

    <div class="btn-group">
        <button id="encodeBtn" class="btn-encode">Encode (Enter)</button>
        <button id="decodeBtn" class="btn-decode">Decode</button>
    </div>

    <label for="output">Result:</label>
    <textarea
        id="output"
        readonly
        placeholder="Result..."
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"></textarea>

    <div class="btn-group-center">
        <button id="copyBtn" class="btn-copy">Copy</button>
        <button id="shareBtn" class="btn-share">Share</button>
    </div>
</div>

<script>
const input = document.getElementById("input");
const output = document.getElementById("output");
const converterTitle = document.getElementById("converterTitle");

const textEncoder = new TextEncoder();
const textDecoder = new TextDecoder("utf-8");

let currentAlgorithm = "Base58";

const Base58 = {
    alphabet: "123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz",

    decodeTable: {},

    init() {
        for (let i = 0; i < this.alphabet.length; i++) {
            this.decodeTable[this.alphabet[i]] = i;
        }
    },

    encode(str) {
        const bytes = textEncoder.encode(str);

        let leadingZeros = 0;

        while (
            leadingZeros < bytes.length &&
            bytes[leadingZeros] === 0
        ) {
            leadingZeros++;
        }

        let value = 0n;

        for (let i = leadingZeros; i < bytes.length; i++) {
            value =
                (value << 8n) |
                BigInt(bytes[i]);
        }

        let result = "";

        while (value > 0n) {
            result =
                this.alphabet[
                    Number(value % 58n)
                ] + result;

            value /= 58n;
        }

        return (
            this.alphabet[0].repeat(leadingZeros) +
            result
        );
    },

    decode(str) {
        let leadingZeros = 0;

        while (
            leadingZeros < str.length &&
            str[leadingZeros] === this.alphabet[0]
        ) {
            leadingZeros++;
        }

        let value = 0n;

        for (let i = leadingZeros; i < str.length; i++) {
            const index =
                this.decodeTable[str[i]];

            if (index === undefined) {
                continue;
            }

            value =
                value * 58n +
                BigInt(index);
        }

        const bytes = [];

        while (value > 0n) {
            bytes.unshift(
                Number(value & 255n)
            );

            value >>= 8n;
        }

        for (let i = 0; i < leadingZeros; i++) {
            bytes.unshift(0);
        }

        return textDecoder.decode(
            new Uint8Array(bytes)
        );
    }
};

Base58.init();

const Base91 = {
    alphabet:
        'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!#$%&()*+,./:;<=>?@[]^_`{|}~"',

    decodeTable: {},

    init() {
        for (let i = 0; i < this.alphabet.length; i++) {
            this.decodeTable[this.alphabet[i]] = i;
        }
    },

    encode(str) {
        const data = textEncoder.encode(str);

        let queue = 0;
        let nbits = 0;
        let result = "";

        for (let i = 0; i < data.length; i++) {
            queue |= data[i] << nbits;
            nbits += 8;

            if (nbits > 13) {
                let val = queue & 8191;

                if (val > 88) {
                    queue >>= 13;
                    nbits -= 13;
                } else {
                    val = queue & 16383;
                    queue >>= 14;
                    nbits -= 14;
                }

                result +=
                    this.alphabet[val % 91] +
                    this.alphabet[Math.floor(val / 91)];
            }
        }

        if (nbits > 0) {
            result += this.alphabet[queue % 91];

            if (nbits > 7 || queue > 90) {
                result += this.alphabet[Math.floor(queue / 91)];
            }
        }

        return result;
    },

    decode(str) {
        let queue = 0;
        let nbits = 0;
        let value = -1;

        const bytes = [];

        for (let i = 0; i < str.length; i++) {
            const c = this.decodeTable[str[i]];

            if (c === undefined) {
                continue;
            }

            if (value < 0) {
                value = c;
            } else {
                value += c * 91;

                queue |= value << nbits;
                nbits += (value & 8191) > 88 ? 13 : 14;

                while (nbits >= 8) {
                    bytes.push(queue & 255);
                    queue >>= 8;
                    nbits -= 8;
                }

                value = -1;
            }
        }

        if (value >= 0) {
            bytes.push(
                (queue | (value << nbits)) & 255
            );
        }

        return textDecoder.decode(
            new Uint8Array(bytes)
        );
    }
};

Base91.init();

function switchAlgorithm() {
    currentAlgorithm =
        currentAlgorithm === "Base58"
            ? "Base91"
            : "Base58";

    converterTitle.textContent =
        currentAlgorithm;
}

function process(isEncode) {
    const value = input.value;

    if (!value) {
        output.value = "";
        return;
    }

    try {
        if (currentAlgorithm === "Base58") {
            output.value = isEncode
                ? Base58.encode(value)
                : Base58.decode(value);
        } else {
            output.value = isEncode
                ? Base91.encode(value)
                : Base91.decode(value);
        }
    } catch (err) {
        console.error(err);
        output.value =
            `Error: ${err.message}`;
    }
}

async function pasteFromClipboard() {
    try {
        const text = await navigator.clipboard.readText();
        input.value = text;

        setTimeout(() => {
            input.focus();
            input.setSelectionRange(0, 0);
        }, 50);
    } catch (err) {
        input.focus();
        input.select();
    }
}

function clearInput() {
    input.value = "";
    output.value = "";
}

async function copyResult() {
    if (!output.value) {
        return;
    }

    try {
        await navigator.clipboard.writeText(
            output.value
        );
    } catch (err) {
        console.error(err);
        alert("Copy failed.");
    }
}

function shareResult() {
    const value = output.value;

    if (!value) {
        return;
    }

    if (navigator.share) {
        navigator.share({
            text: value
        }).catch(console.error);
    } else {
        alert(
            "Your browser does not support direct sharing. Use Copy instead."
        );
    }
}

converterTitle.addEventListener(
    "click",
    switchAlgorithm
);

document
    .getElementById("inputLabel")
    .addEventListener(
        "click",
        () => {
            input.focus();
            input.select();
        }
    );


document
    .getElementById("pasteBtn")
    .addEventListener(
        "click",
        pasteFromClipboard
    );

document
    .getElementById("clearInputBtn")
    .addEventListener(
        "click",
        clearInput
    );

document
    .getElementById("encodeBtn")
    .addEventListener(
        "click",
        () => process(true)
    );

document
    .getElementById("decodeBtn")
    .addEventListener(
        "click",
        () => process(false)
    );

document
    .getElementById("copyBtn")
    .addEventListener(
        "click",
        copyResult
    );

document
    .getElementById("shareBtn")
    .addEventListener(
        "click",
        shareResult
    );

// Place cursor at the beginning after paste or drag-and-drop
function moveInputCursorToStart() {
    setTimeout(() => {
        input.setSelectionRange(0, 0);
    }, 0);
}

input.addEventListener("paste", moveInputCursorToStart);
input.addEventListener("drop", moveInputCursorToStart);

// Run Encode when Enter is pressed and prevent line breaks
input.addEventListener("keydown", event => {
    if (event.key === "Enter") {
        event.preventDefault();
        process(true);
    }
});

// Select all text in result field on click/tap
output.addEventListener("click", () => {
    output.select();
});

output.addEventListener("touchend", () => {
    output.select();
});

window.addEventListener("pagehide", () => {
    input.value = "";
    output.value = "";
});

window.addEventListener("pageshow", event => {
    if (event.persisted) {
        input.value = "";
        output.value = "";
    }
});

window.addEventListener("beforeunload", () => {
    input.value = "";
    output.value = "";
});

</script>

</body>
</html>
